<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Pi Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .pi-display {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            font-family: monospace;
            font-size: 1.2em;
            word-wrap: break-word;
            margin-bottom: 30px;
        }
        
        table {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        th {
            background: rgba(0, 0, 0, 0.2);
            font-weight: bold;
        }
        
        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        .badge.active {
            background: #48bb78;
            color: white;
        }
        
        .badge.inactive {
            background: #f56565;
            color: white;
        }
        
        .refresh-btn {
            background: #4299e1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            background: #3182ce;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Admin Panel - Pi Calculator</h1>
        
        <button class="refresh-btn" onclick="refreshData()">🔄 Refresh</button>
        
        <div class="stats-grid" id="stats">
            <div class="stat-card">
                <div>Chữ số đã tính</div>
                <div class="stat-value" id="digitCount">0</div>
            </div>
            <div class="stat-card">
                <div>Người đã góp</div>
                <div class="stat-value" id="contributorCount">0</div>
            </div>
            <div class="stat-card">
                <div>Vị trí tiếp theo</div>
                <div class="stat-value" id="nextPosition">1</div>
            </div>
            <div class="stat-card">
                <div>Trạng thái</div>
                <div class="stat-value" id="status">🟢 Rảnh</div>
            </div>
        </div>
        
        <div class="pi-display" id="piDisplay">3.</div>
        
        <h2>📜 Lịch sử đóng góp</h2>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Vị trí</th>
                    <th>Chữ số</th>
                    <th>Contributor</th>
                    <th>IP</th>
                    <th>Session</th>
                    <th>Thời gian</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="6" style="text-align: center;">Đang tải...</td></tr>
            </tbody>
        </table>
    </div>
    
    <script>
        async function refreshData() {
            try {
                // Get status
                const statusRes = await fetch('/api/status');
                const status = await statusRes.json();
                
                document.getElementById('digitCount').textContent = status.length;
                document.getElementById('contributorCount').textContent = status.total_contributors;
                document.getElementById('nextPosition').textContent = status.next_position;
                document.getElementById('piDisplay').textContent = status.pi_string;
                
                if (status.is_calculating) {
                    document.getElementById('status').innerHTML = '🔴 Đang tính';
                } else {
                    document.getElementById('status').innerHTML = '🟢 Rảnh';
                }
                
                // Get history
                const historyRes = await fetch('/api/history?limit=100');
                const history = await historyRes.json();
                
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = '';
                
                history.forEach(item => {
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${item.position}</td>
                        <td><strong>${item.digit}</strong></td>
                        <td>${item.contributor}</td>
                        <td>${item.ip || 'N/A'}</td>
                        <td>${item.session || 'N/A'}</td>
                        <td>${new Date(item.time).toLocaleString()}</td>
                    `;
                });
                
            } catch (error) {
                console.error('Error refreshing:', error);
            }
        }
        
        // Refresh every 5 seconds
        setInterval(refreshData, 5000);
        refreshData();
    </script>
</body>
</html>
