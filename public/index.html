<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>π Cùng Tính Số Pi</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Style cơ bản đề phòng CSS lỗi */
        body { font-family: Arial; background: #0f0c29; color: white; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .pi-display { font-size: 2em; background: #333; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">π Cùng Tính Số Pi</h1>
        <p class="subtitle">Mỗi người chỉ tính <strong>MỘT chữ số</strong></p>
        
        <div class="pi-card">
            <div class="pi-display" id="piDisplay">
                <span class="pi-integer">3</span><span class="pi-decimal">.</span>
                <span class="pi-fraction" id="piFraction"></span>
                <span class="next-digit" id="nextDigitIndicator">_</span>
            </div>
            
            <div class="pi-controls">
                <button class="calculate-btn" id="calculateBtn">
                    <span class="btn-icon">🔢</span>
                    <span class="btn-text">Tính chữ số tiếp theo</span>
                </button>
                <button class="cancel-btn" id="cancelBtn" style="display: none;">
                    <span class="btn-icon">❌</span>
                    <span class="btn-text">Hủy</span>
                </button>
            </div>
            
            <div class="timer" id="timer" style="display: none;">
                ⏳ Còn <span id="timerSeconds">30</span> giây
            </div>
            
            <div id="calculationArea" style="display: none;" class="calculation-area">
                <div class="calculator-spinner"></div>
                <p>Đang tính toán...</p>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="digitCount">0</div>
                <div class="stat-label">Chữ số</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="contributorCount">0</div>
                <div class="stat-label">Người góp</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-value" id="nextPosition">1</div>
                <div class="stat-label">Vị trí</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-value" id="status">Rảnh</div>
                <div class="stat-label">Trạng thái</div>
            </div>
        </div>
        
        <div class="message" id="message"></div>
        
        <div class="history-section">
            <h3>📜 Lịch sử</h3>
            <div class="history-list" id="historyList">
                <div class="loading">Đang tải...</div>
            </div>
        </div>
        
        <div class="info-section">
            <h3>ℹ️ Hướng dẫn</h3>
            <ul>
                <li>Nhấn "Tính" để xin khóa</li>
                <li>Có 30 giây để tính</li>
                <li>Kết quả cập nhật real-time</li>
            </ul>
        </div>
    </div>
    
    <script src="/script.js"></script>
</body>
</html>
